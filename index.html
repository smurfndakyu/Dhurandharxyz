<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Video Player</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}

.player {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: black;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* Hide native fullscreen */
video::-webkit-media-controls-fullscreen-button {
  display: none;
}

/* Buttons common */
.btn {
  position: absolute;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 22px;
  padding: 18px;
  cursor: pointer;
}

/* Seek buttons */
.back { left: 30px; top: 50%; transform: translateY(-50%); }
.forward { right: 30px; top: 50%; transform: translateY(-50%); }

/* Center play button */
.center {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  padding: 26px;
}

/* Hide animation */
.hide {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
</style>
</head>

<body>

<div class="player" id="player">

  <video id="video">
    <source src="https://streambot-e9ea39644697.herokuapp.com/AgAD2R557">
  </video>

  <button class="btn back" id="back">⏪</button>
  <button class="btn center" id="playPause">▶</button>
  <button class="btn forward" id="forward">⏩</button>

</div>

<script>
const video = document.getElementById("video");
const back = document.getElementById("back");
const forward = document.getElementById("forward");
const playPause = document.getElementById("playPause");
const player = document.getElementById("player");

let timer;

/* Seek */
back.onclick = () => seek(-10);
forward.onclick = () => seek(10);

function seek(sec) {
  video.currentTime += sec;
  showControls();
}

/* Play / Pause */
playPause.onclick = togglePlay;

function togglePlay() {
  if (video.paused) {
    video.play();
  } else {
    video.pause();
  }
  updatePlayIcon();
  showControls();
}

function updatePlayIcon() {
  playPause.textContent = video.paused ? "▶" : "⏸";
}

/* Auto hide */
function showControls() {
  back.classList.remove("hide");
  forward.classList.remove("hide");
  playPause.classList.remove("hide");

  clearTimeout(timer);
  timer = setTimeout(() => {
    back.classList.add("hide");
    forward.classList.add("hide");
    playPause.classList.add("hide");
  }, 3000);
}

/* Remote control keys */
document.addEventListener("keydown", (e) => {
  showControls();

  if (e.key === "ArrowLeft") seek(-10);
  if (e.key === "ArrowRight") seek(10);
  if (e.key === "Enter" || e.key === " ") togglePlay();
});

/* Sync icon */
video.addEventListener("play", updatePlayIcon);
video.addEventListener("pause", updatePlayIcon);

/* Show controls on interaction */
["click", "mousemove", "touchstart"].forEach(ev => {
  player.addEventListener(ev, showControls);
});

showControls();
</script>

</body>
</html>
